# .github/workflows/semantic-release.yml
name: Semantic Release

on:
  push:
    branches:
      - main

# This is crucial to allow the action to create tags and releases
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We need the full history to analyze all commits
          fetch-depth: 0

      - name: Go Semantic Release
        uses: go-semantic-release/action@v1
        with:
          # The branch to release from
          branches: |
            main
        env:
          # This token is automatically provided by GitHub Actions.
          # The 'permissions' block above grants it the necessary scopes.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
