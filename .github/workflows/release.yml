# .github/workflows/release.yml
name: Release

on:
  push:
    branches:
      - main

jobs:
  # This job determines the new version and creates the Git tag.
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the new tag
    outputs:
      # These outputs are passed to the next job
      new_tag: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Go Semantic Release
        id: semantic # We give this step an ID to reference its outputs
        uses: go-semantic-release/action@v1
        with:
          create-release: "false"
          extra-args: "--no-v1-jump-from-v0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # This job runs ONLY if the 'tag' job created a new version.
  # It builds the binaries and creates the GitHub Release.
  release:
    runs-on: ubuntu-latest
    needs: tag # This job depends on the 'tag' job
    if: needs.tag.outputs.new_release_published == 'true'
    permissions:
      contents: write # Required to create the release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This is the crucial part: we check out the new tag created in the previous job
          ref: ${{ needs.tag.outputs.new_tag }}
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
