# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - 'v*' # This workflow runs on tags like v0.1.0, v1.2.3, etc.

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This is required to allow GoReleaser to fetch all Git history
          # for the changelog generation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Make sure this matches your go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          # The version of goreleaser to use.
          version: latest
          # The --release-notes flag tells GoReleaser to use the changelog
          # already generated by the semantic-release action.
          args: release --release-notes
        env:
          # This token is provided by GitHub Actions automatically.
          # It's used to create the release on your repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
